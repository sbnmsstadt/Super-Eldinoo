<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Fatihoo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>SUPER ELDINOOO</h1>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>

        <div id="hud">
            <div><span id="score-label">SCORE</span>: <span id="score">0</span></div>
            <div><span id="coins-label">COINS</span>: <span id="coins">0</span></div>
        </div>

        <button id="pause-button" class="hidden">⏸</button>

        <div id="ui-overlay">
            <div id="start-screen">
                <h2>Bist du bereit?</h2>
                <p>Spieler 1 (Mario): WASD<br>Spieler 2 (Luigi): Pfeiltasten</p>
                <div class="button-group">
                    <button id="start-button-1">1 SPIELER</button>
                    <button id="start-button-2">2 SPIELER</button>
                    <button id="host-button">HOST MULTIPLAYER</button>
                    <button id="settings-button">⚙️</button>
                </div>
                <div id="invite-container" class="hidden"
                    style="margin-top: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;">
                    <p style="margin: 0 0 5px 0;">Dein Invite-Link:</p>
                    <input type="text" id="invite-link" readonly
                        style="width: 80%; padding: 5px; font-family: monospace;">
                    <button id="copy-link-button" style="padding: 5px 10px; font-size: 14px;">KOPIEREN</button>
                    <p id="invite-status" style="margin: 5px 0 0 0; font-size: 12px; color: #aaa;">Warte auf Spieler
                        2...</p>
                </div>
            </div>

            <div id="settings-screen" class="hidden">
                <h2 id="settings-title">EINSTELLUNGEN</h2>
                <div class="settings-group">
                    <label for="volume-slider" id="label-volume">Lautstärke Musik</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.35">
                </div>
                <div class="settings-group">
                    <label for="language-select" id="label-language">Sprache</label>
                    <select id="language-select">
                        <option value="de">Deutsch</option>
                        <option value="en">English</option>
                        <option value="bs">Bosanski</option>
                        <option value="ro">Română</option>
                        <option value="sr">Srpski</option>
                        <option value="tr">Türkçe</option>
                    </select>
                </div>
                <button id="settings-back-button">ZURÜCK</button>
            </div>

            <div id="game-over-screen" class="hidden">
                <h2>GAME OVER</h2>
                <p><span id="final-score-label">Dein Score</span>: <span id="final-score">0</span></p>
                <button id="restart-button">ERNEUT VERSUCHEN</button>
            </div>

            <div id="win-screen" class="hidden">
                <h2>SIEG!</h2>
                <p id="win-message">Du hast es geschafft!</p>
                <p><span id="win-score-label">Dein Score</span>: <span id="win-score">0</span></p>
                <button id="win-restart-button">NOCHMAL SPIELEN</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>

</html>
