<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Fatihoo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>SUPER ELDINOOO</h1>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>

        <div id="hud">
            <div>SCORE: <span id="score">0</span></div>
            <div>COINS: <span id="coins">0</span></div>
        </div>

        <div id="ui-overlay">
            <div id="start-screen">
                <h2>Bist du bereit?</h2>
                <p>Spieler 1 (Mario): WASD<br>Spieler 2 (Luigi): Pfeiltasten</p>
                <div class="button-group">
                    <button id="start-button-1">1 SPIELER</button>
                    <button id="start-button-2">2 SPIELER</button>
                </div>
            </div>

            <div id="game-over-screen" class="hidden">
                <h2>GAME OVER</h2>
                <p>Dein Score: <span id="final-score">0</span></p>
                <button id="restart-button">ERNEUT VERSUCHEN</button>
            </div>

            <div id="win-screen" class="hidden">
                <h2>SIEG!</h2>
                <p>Du hast es geschafft!</p>
                <p>Dein Score: <span id="win-score">0</span></p>
                <button id="win-restart-button">NOCHMAL SPIELEN</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
